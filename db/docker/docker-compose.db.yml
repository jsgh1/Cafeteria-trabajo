services:
  postgres:
    image: postgres:16
    container_name: cafeteria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cafeteria_db
      POSTGRES_USER: cafeteria_user
      POSTGRES_PASSWORD: cafeteria_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeteria_user -d cafeteria_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    image: liquibase/liquibase:4.31
    container_name: cafeteria_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../liquibase:/liquibase/changelog
      - ../01_tables:/liquibase/01_tables
      - ../09_inserts:/liquibase/09_inserts
      - ../11_rollbacks:/liquibase/11_rollbacks
    working_dir: /liquibase/changelog
    command: ["--defaults-file=liquibase.properties", "update"]

volumes:
  postgres_data:
